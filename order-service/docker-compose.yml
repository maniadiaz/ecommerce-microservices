services:
  order-db:
    image: postgres:16
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: order-server-db-user-123
      POSTGRES_PASSWORD: order-service-db-password-123
    ports:
      - "5433:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data

volumes:
  order-db-data: