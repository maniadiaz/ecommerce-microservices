services:
  user-db:
    image: postgres:16
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: user-server-db-user-123
      POSTGRES_PASSWORD: user-service-db-password-123
    ports:
      - "5434:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data

volumes:
  order-db-data: