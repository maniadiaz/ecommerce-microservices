services:
  product-db:
    image: postgres:16
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: product-server-db-user-123
      POSTGRES_PASSWORD: product-service-db-password-123
    ports:
      - "5432:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data

volumes:
  product-db-data: